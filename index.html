<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      canvas { filter: saturate(1.2) contrast(1.1) brightness(1.05); }
      canvas {
        /* Esto permite que los clics atraviesen el canvas y lleguen al raycaster */
        pointer-events: auto; 
      }
    </style>
</head>
<body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.01;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model" src="./minecraft_fox.glb"></a-asset-item>
      </a-assets>

      <a-camera 
        position="0 0 0" 
        look-controls="enabled: false"
        cursor="rayOrigin: mouse" 
        raycaster="objects: .clickable; interval: 100;">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        
        <a-gltf-model 
          src="#model" 
          position="0 0 0" 
          rotation="0 -90 -90"
          scale="0.3 0.3 0.3">
        </a-gltf-model>
      
        <a-box 
          id="boton-invisible"
          position="0 0 0" 
          scale="2 2 2" 
          visible="true" 
          class="clickable">
        </a-box>
      
        <a-plane 
          color="blue" 
          opacity="0.5" 
          position="0 0 -0.05" 
          height="1" 
          width="1">
        </a-plane>
        
      </a-entity>
    </a-scene>
    
    <div id="debug-log" style="position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: lime; padding: 10px; border-radius: 5px; font-family: monospace; z-index: 9999; pointer-events: none;">
  Esperando clic...
    </div>

    <script>
      const logDiv = document.querySelector('#debug-log');
      
      // Función para escribir en pantalla
      function log(msg) {
        logDiv.innerHTML = msg;
        console.log(msg); // Por si acaso conectas la PC después
      }
    
      document.querySelector('a-scene').addEventListener('loaded', function () {
        const cubo = document.querySelector('#boton-invisible');
        
        log("Escena cargada. Toca el cubo rojo.");
    
        // Detectar clic en el cubo
        cubo.addEventListener('click', function (evt) {
          log("¡ÉXITO! Clic en el cubo.");
          window.open('https://www.instagram.com/poxi_bran?igsh=Yzhnc3A4MGs4b3N3', '_blank');
        });
    
        // Detectar si tocamos cualquier otra cosa
        document.addEventListener('click', function(evt) {
          if (evt.target.id !== 'boton-invisible') {
            log("Tocaste: " + evt.target.tagName);
          }
        });
      });
    </script>

</body>
</html>
