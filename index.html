<!DOCTYPE html>
<html lang="es">
  
  <head>
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta</title>
  </head>
  
  <body>
    <a-scene mindar-image="imageTarjetSrc: ./targets.mind" vr-mode-ui="enabled:false" device-orientation-permission-ui="enabled:false">
      <a-assets>
        <a-assets-item id="model" src="./fox.gltf"></a-assets-item>
      </a-assets>
      <a-camera position="0 0 0" look-controls="enabled:false"></a-camera>
      <a-entity mindar-image-tarjet="tarjetIndex:0">
        <a-gltf-model rotation="0 0 0" position="0 0 0" scale="1 1 1" src="#model"></a-gltf-model>
      </a-entity>
    </a-scene>
  </body>
  
</html>
