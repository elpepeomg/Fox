<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta AR Interactiva</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      /* Asegura que el canvas reciba los toques */
      canvas { pointer-events: auto !important; }
      #debug-log { 
        position: absolute; top: 10px; left: 10px; 
        background: rgba(0,0,0,0.7); color: lime; 
        padding: 10px; border-radius: 5px; 
        font-family: monospace; z-index: 9999; 
      }
    </style>
</head>
<body>
    <div id="debug-log">Esperando cámara...</div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind;"
      embedded
      renderer="colorManagement: true; antialias: true;"
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model" src="./minecraft_fox.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;" 
        raycaster="objects: .clickable; far: 10000; interval: 100;">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="zorro"
          src="#model" 
          position="0 0 0" 
          rotation="0 -90 -90"
          scale="0.3 0.3 0.3"
          class="clickable">
        </a-gltf-model>
      </a-entity>
    </a-scene>

    <script>
      const logDiv = document.querySelector('#debug-log');
      function log(msg) { logDiv.innerHTML = msg; }

      document.querySelector('a-scene').addEventListener('loaded', function () {
        const zorro = document.querySelector('#zorro');
        log("Escena lista. Toca el zorro.");

        // Función para abrir el enlace
        const abrirInstagram = () => {
          log("¡Clic detectado!");
          window.open('https://www.instagram.com/poxi_bran?igsh=Yzhnc3A4MGs4b3N3', '_blank');
        };

        // Escucha ambos eventos para asegurar compatibilidad total en móviles
        zorro.addEventListener('click', abrirInstagram);
        zorro.addEventListener('touchstart', abrirInstagram);
      });
    </script>
</body>
</html>
