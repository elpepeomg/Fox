<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta AR</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
    <style>
      canvas { filter: saturate(1.2) contrast(1.1) brightness(1.05); }
    </style>
</head>
<body>
    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.01;"
      color-space="sRGB"
      renderer="colorManagement: true, physicallyCorrectLights"
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-assets>
        <a-asset-item id="model" src="./minecraft_fox.glb"></a-asset-item>
      </a-assets>

      <a-camera position="0 0 0" look-controls="enabled: false"
        cursor="fuse: false; rayOrigin: mouse;" 
        raycaster="objects: .clickable">
      </a-camera>

      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model 
          id="zorro"
          src="#model" 
          position="0 0 0" 
          rotation="0 -90 -90"
          scale="0.3 0.3 0.3"
          class="clickable">
        </a-gltf-model>

        <a-plane 
          color="red" 
          opacity="0.5" 
          position="0 0 -0.05" 
          height="1" 
          width="1">
        </a-plane>
      </a-entity>
    </a-scene>

    <script>
      // Esperamos a que la escena cargue completamente
      document.querySelector('a-scene').addEventListener('loaded', function () {
        document.querySelector('#zorro').addEventListener('click', function (evt) {
          window.open('https://www.instagram.com/poxi_bran?igsh=Yzhnc3A4MGs4b3N3', '_blank');
        });
      });
    </script>
</body>
</html>
